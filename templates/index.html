<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar-Sense Kochi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-4">☀️ Solar-Sense Dashboard</h1>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm border-0">
                    <h3 class="h5 mb-3">Appliance Settings</h3>
                    <div class="mb-3">
                        <label class="form-label">AC Watts (from sticker):</label>
                        <input type="number" id="ac_watts" class="form-control" value="1500">
                    </div>
                    <button class="btn btn-warning w-100 fw-bold" onclick="updateSimulation()">Simulate</button>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-4 shadow-sm border-0 text-center" style="min-height: 200px;">
                    <div class="my-auto">
                        <h2 class="display-6">Live Generation</h2>
                        <h2 class="display-1 fw-bold"><span id="gen-val" class="text-success">--</span> <small class="h4">W</small></h2>
                        <h4 id="status-msg" class="text-muted mt-3">Click simulate to fetch Kochi weather...</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
